# Ansible config for the LCI cluster provisioning.
#
# forks=1: run hosts serially. The community.docker.docker_api connection is
# multithreaded, and Ansible hardcodes the `fork` multiprocessing start method;
# on macOS, forking that threaded parent crashes ("A worker was found in a dead
# state"). Serial execution sidesteps it entirely — fine for a small cluster.
[defaults]
inventory = containers.docker.yml
forks = 1
host_key_checking = False
# Quiet the interpreter-discovery warning; nodes are Rocky 9 with python3.
interpreter_python = /usr/bin/python3
retry_files_enabled = False
