# Static fallback inventory (NOT used by any `just` recipe — the dynamic
# containers.docker.yml is the supported path). Hostnames/IPs below assume the
# default Justfile config: PREFIX=lci, CLUSTER_NUM=01, NETWORK=10.0.10.
# Adjust to match your config if you use this file directly.

[head]
lci-head-01-1 ansible_host=10.0.10.2 ansible_user=root ansible_password=root

[compute]
lci-compute-01-1 ansible_host=10.0.10.3 ansible_user=root ansible_password=root
lci-compute-01-2 ansible_host=10.0.10.4 ansible_user=root ansible_password=root

[storage]
lci-storage-01-1 ansible_host=10.0.10.5 ansible_user=root ansible_password=root

# head + compute are the NFS clients that mount /scratch
[nfs_clients:children]
head
compute
