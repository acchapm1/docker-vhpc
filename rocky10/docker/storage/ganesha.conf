# nfs-ganesha: userspace NFS server for the LCI storage node.
# Exports /export over NFSv4 only — no portmap/statd/NLM/rquota, so it runs in a
# container without the in-kernel nfsd module (absent on the Docker Desktop
# LinuxKit kernel). Clients mount with `-o nfsvers=4`.

NFS_CORE_PARAM {
    Enable_NLM = false;
    Enable_RQUOTA = false;
    Protocols = 4;
}

NFSv4 {
    # Fast recovery on container restart; no Kerberos.
    Graceless = true;
    Lease_Lifetime = 10;
    Grace_Period = 5;
}

EXPORT {
    Export_Id = 1;
    Path = /export;
    Pseudo = /export;
    Access_Type = RW;
    Squash = No_Root_Squash;
    SecType = sys;
    Transports = TCP;

    FSAL {
        Name = VFS;
    }
}
