[supervisord]
nodaemon=true

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
stdout_logfile=/var/log/sshd.out
stderr_logfile=/var/log/sshd.err

[program:storage-init]
command=/usr/local/bin/storage-init.sh
autostart=true
# storage-init sets up the extra PFS drives, then idles (tail -f) — on Rocky 10
# there is no NFS server to run. It stays the long-lived process; restart it
# only on an unexpected (non-zero) exit.
autorestart=unexpected
exitcodes=0
startsecs=5
stdout_logfile=/var/log/storage.out
stderr_logfile=/var/log/storage.err
